<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2c2c2c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a1a;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="32" height="32" rx="6" ry="6" fill="url(#bgGrad)"/>

  <!-- Letter F stylized in red (Factux brand color) -->
  <rect x="7" y="7" width="3" height="18" rx="1" fill="#cc2222"/>
  <rect x="7" y="7" width="13" height="3" rx="1" fill="#cc2222"/>
  <rect x="7" y="15" width="10" height="3" rx="1" fill="#cc2222"/>

  <!-- Small wifi/signal dots top right (referencing logo icon) -->
  <circle cx="24" cy="9" r="1.2" fill="#cc2222" opacity="0.9"/>
  <circle cx="24" cy="13" r="1.2" fill="#cc2222" opacity="0.6"/>
  <circle cx="24" cy="17" r="1.2" fill="#cc2222" opacity="0.3"/>
</svg>
